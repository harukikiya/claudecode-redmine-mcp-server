# =====================================================================
# Labels definition
# ---------------------------------------------------------------------
# .github/workflows/labels-sync.yml がこのファイルを読み、GitHub上のラベルと同期する。
# このYAMLが「single source of truth」になるので、GitHub UIで手動でラベルを
# 追加/削除しないこと（次回syncで上書きまたは削除される）。
#
# 命名規則: prefix付きで分類
#   - type: 何の種別か（tool / bug / feature / adr / docs / infra / question）
#   - status: 現在の状態（triage / ready / in-progress / blocked / needs-review / proposed）
#   - tier: tier-1 / tier-2 / tier-3（docs/tools.md の Tier に対応）
#   - size: xs / s / m / l（PR/issueのサイズ感）
# =====================================================================

# === Type ===
- name: "type: tool"
  color: "1f77b4"
  description: Redmine MCP toolの実装
- name: "type: bug"
  color: "d73a4a"
  description: 不具合
- name: "type: feature"
  color: "a2eeef"
  description: 新機能・機能改善
- name: "type: adr"
  color: "8957e5"
  description: 設計判断（ADR）
- name: "type: docs"
  color: "0075ca"
  description: ドキュメント
- name: "type: infra"
  color: "fbca04"
  description: CI/CD・dev基盤
- name: "type: question"
  color: "cc317c"
  description: 質問・議論

# === Status ===
- name: "status: triage"
  color: "ededed"
  description: 確認・分類待ち
- name: "status: ready"
  color: "0e8a16"
  description: 着手可能
- name: "status: in-progress"
  color: "fbca04"
  description: 作業中
- name: "status: blocked"
  color: "b60205"
  description: ブロック中
- name: "status: needs-review"
  color: "fef2c0"
  description: レビュー待ち
- name: "status: proposed"
  color: "c5def5"
  description: ADR提案中

# === Tier ===
- name: "tier-1"
  color: "0e8a16"
  description: Tier 1 (M2 Core)
- name: "tier-2"
  color: "5319e7"
  description: Tier 2 (M3前半)
- name: "tier-3"
  color: "c5def5"
  description: Tier 3 (M3後半)

# === Size ===
- name: "size: xs"
  color: "c2e0c6"
  description: 数行レベルの変更
- name: "size: s"
  color: "bfdadc"
  description: 1ファイル・数十行程度
- name: "size: m"
  color: "bfd4f2"
  description: 複数ファイル・数百行
- name: "size: l"
  color: "d4c5f9"
  description: 大規模変更・要分割検討

# === Dependencies / その他 ===
- name: "dependencies"
  color: "0366d6"
  description: 依存パッケージ更新（Dependabot）
- name: "python"
  color: "3572a5"
- name: "github-actions"
  color: "000000"
- name: "good first issue"
  color: "7057ff"
- name: "help wanted"
  color: "008672"