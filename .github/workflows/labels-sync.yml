# =====================================================================
# Labels Sync workflow
# ---------------------------------------------------------------------
# .github/labels.yml を編集してmainにpushすると、GitHub上のラベルと同期する。
# ラベル定義をgit管理することで、設定をrepoに残せる（UIで触ると履歴に残らない）。
#
# action: EndBug/label-sync@v2
# （旧 micnncim/action-label-syncer はメンテ停止＋createが効かない不具合あり）
# =====================================================================

name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      # labels.yml が変更されたときのみ実行
      - ".github/labels.yml"
  # 手動実行も可能に（actions tabからRun workflow）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # label作成/削除のための権限
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          # ラベル定義ファイルへのpath
          config-file: .github/labels.yml
          # true: labels.ymlにないラベルをGitHubから削除（micnncimの`prune`相当）
          # 運用開始してから false にしてもよい（誤削除防止）
          delete-other-labels: true